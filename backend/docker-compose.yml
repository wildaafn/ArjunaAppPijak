services:
  api:
    build: .
    container_name: arjuna_pijak_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - shared-network

networks:
  shared-network:
    external: true
