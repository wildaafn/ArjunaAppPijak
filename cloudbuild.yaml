steps:
  # ─── BUILD BACKEND ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:latest'
      - '-f'
      - 'backend/Dockerfile.prod'
      - './backend'

  # ─── BUILD FRONTEND ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/frontend:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/frontend:latest'
      - '-f'
      - 'frontend/Dockerfile.prod'
      - '--build-arg'
      - 'VITE_API_URL=https://arjuna-backend-60410062142.asia-southeast2.run.app'
      - './frontend'

  # ─── PUSH BACKEND ────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend'

  # ─── PUSH FRONTEND ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/frontend'

  # ─── DEPLOY BACKEND TO CLOUD RUN ─────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arjuna-backend'
      - '--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=^@^APP_ENV=production@DEBUG=False@ALLOWED_ORIGINS=https://arjunapijak.web.id,https://arjuna-frontend-60410062142.asia-southeast2.run.app'
      - '--set-secrets=DATABASE_URL_ENV=arjuna-db-url:latest,NVIDIA_API_KEY=arjuna-nvidia-key:latest'

  # ─── DEPLOY FRONTEND TO CLOUD RUN ────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arjuna-frontend'
      - '--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/frontend:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

  # ─── BUILD MOBILE (FLUTTER WEB) ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-mobile'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:latest'
      - '-f'
      - 'mobile/Dockerfile.prod'
      - './mobile'

  # ─── PUSH MOBILE ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-mobile'
    waitFor: ['build-mobile']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile'

  # ─── DEPLOY MOBILE TO CLOUD RUN ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-mobile'
    waitFor: ['push-mobile']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arjuna-mobile'
      - '--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/frontend:$COMMIT_SHA'
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
