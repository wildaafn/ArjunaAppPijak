name = "arjuna-cloudrun-proxy"
main = "src/index.js"
compatibility_date = "2023-10-30"

# Ganti dengan Zone ID Anda jika Anda ingin mendeploy via CLI tanpa prompt (opsional)
# zone_id = "YOUR_ZONE_ID"

# Rute yang akan dicegat oleh Worker ini
routes = [
  { pattern = "arjunapijak.web.id/*", zone_name = "arjunapijak.web.id" },
  { pattern = "api.arjunapijak.web.id/*", zone_name = "arjunapijak.web.id" },
  { pattern = "mobile.arjunapijak.web.id/*", zone_name = "arjunapijak.web.id" }
]
