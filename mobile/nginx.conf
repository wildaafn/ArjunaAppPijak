server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets (fonts, images, etc.) - excluding main JS entrypoints
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache HTML, entry point JS, and service worker to ensure instant updates
    location ~* (index\.html|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Fallback to index.html for Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Cloud Run
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
