steps:
  # ─── BUILD MOBILE (FLUTTER WEB) — force no cache ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-mobile'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:latest'
      - '-f'
      - 'mobile/Dockerfile.prod'
      - './mobile'

  # ─── PUSH MOBILE ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-mobile'
    waitFor: ['build-mobile']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile'

  # ─── DEPLOY MOBILE TO CLOUD RUN ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-mobile'
    waitFor: ['push-mobile']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arjuna-mobile'
      - '--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/mobile:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
