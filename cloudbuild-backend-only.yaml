steps:
  # Build backend only
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:latest'
      - '-f'
      - 'backend/Dockerfile.prod'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arjuna-backend'
      - '--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=^@^APP_ENV=production@DEBUG=False@ALLOWED_ORIGINS=https://arjunapijak.web.id,https://arjuna-frontend-60410062142.asia-southeast2.run.app,https://mobile.arjunapijak.web.id'
      - '--set-secrets=DATABASE_URL_ENV=arjuna-db-url:latest,NVIDIA_API_KEY=arjuna-nvidia-key:latest,GNEWS_API_KEY=arjuna-gnews-key:latest'

images:
  - 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/arjuna-pijak/backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
